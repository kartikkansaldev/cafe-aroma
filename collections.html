<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collections | Cafe Aroma</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script type="module" src="https://cdn.shopify.com/storefront/web-components.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { max-width: 100vw !important; overflow-x: hidden !important; }
        body { background-color: #EAE0CD; color: #2C1810; margin: 0; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        .nav-container { transition: padding 0.3s; background: rgba(234, 224, 205, 0.95); padding: 24px 100px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; box-sizing: border-box; z-index: 100; backdrop-filter: blur(12px); pointer-events: auto; }
        .logo { font-family: 'Playfair Display', serif; font-size: 24px; color: #2C1810; text-decoration: none; font-style: italic; }
        .nav-links { display: flex; gap: 40px; pointer-events: auto; }
        .nav-link { color: #2C1810; text-decoration: none; font-size: 16px; opacity: 0.8; text-transform: uppercase; font-weight: 500; letter-spacing: 0.05em; transition: opacity 0.3s; }
        .nav-link:hover, .nav-link.active { opacity: 1; }
        
        .collection-page-container { max-width: 1400px; margin: 0 auto; padding: 0 5%; flex: 1; width: 100%; box-sizing: border-box; }
        .collection-header { padding: 120px 5% 20px; margin-bottom: 5px; text-align: center; }
        .collection-title { font-family: 'Playfair Display', serif; font-size: clamp(36px, 5vw, 60px); font-weight: 700; letter-spacing: -0.02em; margin: 0 0 16px 0; color: #2C1810; }
        .collection-description { font-size: 16px; line-height: 1.6; color: #5D4F45; max-width: 600px; margin: 0 auto; }
        
        .collection-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 40px 20px; padding: 0 5% 60px; max-width: 1400px; margin: 0 auto; justify-items: center; }
        
        /* Updated Product Card inline */
        .shopify-product-card { width: 100%; max-width: 320px; text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: 24px; cursor: pointer; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); background: transparent; border: none; height: 100%; }
        .shopify-product-card:hover { transform: translateY(-12px); box-shadow: none; }
        
        .shopify-product-media { width: 100%; aspect-ratio: 1; overflow: hidden; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); background: #F5F5F5; }
        .shopify-product-media shopify-media { width: 100%; height: 100%; display: block; }
        .shopify-product-media shopify-media::part(image) { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .shopify-product-card:hover .shopify-product-media shopify-media::part(image) { transform: scale(1.05); }
        
        .shopify-product-info { padding: 0; display: flex; flex-direction: column; flex-grow: 1; }
        .shopify-product-title { font-family: 'Playfair Display', serif; font-size: 32px; margin: 0; color: #2C1810; line-height: 1.2; font-weight: 400; }
        
        .shopify-product-price { margin-top: auto; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: #C4A484; position: relative; display: inline-block; width: fit-content; }
        .shopify-product-price::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 1px; background: #C4A484; transition: width 0.3s ease; }
        .shopify-product-card:hover .shopify-product-price::after { width: 100%; }
        
        .collection-nav { display: flex; justify-content: center; gap: 20px; margin-top: 20px; margin-bottom: 60px; }
        .collection-nav button { padding: 12px 24px; background: transparent; border: 1px solid #C4A484; color: #C4A484; border-radius: 4px; font-weight: 600; text-transform: uppercase; cursor: pointer; transition: background 0.3s, color 0.3s; }
        .collection-nav button:hover { background: #C4A484; color: #FFF; }
        .collection-nav button:disabled { border-color: rgba(44, 24, 16, 0.2); color: rgba(44, 24, 16, 0.4); background: transparent; cursor: not-allowed; pointer-events: none; }
        
        /* Cart fix */
        #cart:not([open]) { display: none !important; pointer-events: none; }
        
        @media (max-width: 768px) { .nav-container { padding: 15px 20px !important; } .nav-links { gap: 15px !important; } .logo { font-size: 20px !important; } .nav-link { font-size: 14px !important; } .collection-header { padding-top: 100px !important; } .collection-title { font-size: 48px !important; } }
        @media (max-width: 480px) { .nav-container { padding: 12px 16px !important; } .nav-links { gap: 8px !important; } .logo { font-size: 15px !important; white-space: nowrap; } .nav-link { font-size: 10px !important; white-space: nowrap; } .collection-title { font-size: 36px !important; } .collection-grid { grid-template-columns: 1fr; padding: 0 16px 40px; gap: 32px; } }
    </style>
  <script type="module" crossorigin src="/cafe-aroma/assets/modulepreload-polyfill-B5Qt9EMX.js"></script>
  <link rel="stylesheet" crossorigin href="/cafe-aroma/assets/footer-B0Yn5mFe.css">
  <link rel="stylesheet" crossorigin href="/cafe-aroma/assets/products-Bf8lmOF7.css">
</head>
<body>
    <nav class="nav-container">
        <a href="index.html" class="logo">Cafe Aroma</a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="collections.html" class="nav-link active">Shop</a>
            <a href="blog.html" class="nav-link">Journal</a>
        </div>
        <button onclick="document.getElementById('cart').showModal()" style="background:none; border:none; cursor:pointer; color:#2C1810;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 20a1 1 0 100 2 1 1 0 000-2zm9 0a1 1 0 100 2 1 1 0 000-2zM1 1h2.79l1.9 15h13.1l1.2-11H5.25"/></svg>
        </button>
    </nav>
    
    <shopify-store store-domain="e21d1w-na.myshopify.com" public-access-token="94165483cfacc4469db2175db544410c"></shopify-store>
    <shopify-cart id="cart"></shopify-cart>

    <main class="collection-page-container">
        <script>
            const cHandle = new URLSearchParams(window.location.search).get('handle') || 'frontpage';
            document.write('<shopify-context type="collection" id="collection-context" handle="' + cHandle + '">');
        </script>
            <template>
                <div class="collection-header">
                    <h1 class="collection-title">Our Collection</h1>
                    <p class="collection-description"><shopify-data query="collection.description"></shopify-data></p>
                </div>
                
                <div class="collection-grid">
                    <shopify-list-context id="list-context" type="product" query="collection.products" first="12">
                        <template>
                            <div class="shopify-product-card" shopify-attr--data-handle="product.handle" onclick="window.location.href='product.html?handle=' + this.dataset.handle">
                                <div class="shopify-product-media">
                                    <shopify-media query="product.selectedOrFirstAvailableVariant.image"></shopify-media>
                                </div>
                                <div class="shopify-product-info">
                                    <h3 class="shopify-product-title"><shopify-data query="product.title"></shopify-data></h3>
                                    <div class="shopify-product-price">
                                        <shopify-money query="product.selectedOrFirstAvailableVariant.price"></shopify-money>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </shopify-list-context>
                </div>
                
                <div class="collection-nav">
                    <button id="previous" onclick="document.getElementById('list-context').previousPage();">Previous</button>
                    <button id="next" onclick="document.getElementById('list-context').nextPage();">Next</button>
                </div>
            </template>
            <div shopify-loading-placeholder style="text-align:center; padding:100px;">Loading collection...</div>
        </shopify-context>
    </main>

    <footer class="big-footer">
        <div class="footer-brand-title">CAFE AROMA</div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.addEventListener("shopify-list-context-update", (event) => {
                if (event.target.id === 'list-context') {
                    const { hasNextPage, hasPreviousPage } = event.detail;
                    const nextBtn = document.getElementById("next");
                    const prevBtn = document.getElementById("previous");
                    
                    if (nextBtn) {
                        if (!hasNextPage) nextBtn.setAttribute("disabled", "true");
                        else nextBtn.removeAttribute("disabled");
                    }
                    if (prevBtn) {
                        if (!hasPreviousPage) prevBtn.setAttribute("disabled", "true");
                        else prevBtn.removeAttribute("disabled");
                    }
                }
            });
        });
    </script>
</body>
</html>
