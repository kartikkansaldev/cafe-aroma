<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Cafe Aroma</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script type="module" src="https://cdn.shopify.com/storefront/web-components.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { background-color: #EAE0CD; color: #2C1810; margin: 0; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        .nav-container { transition: padding 0.3s; background: rgba(234, 224, 205, 0.95); padding: 24px 100px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; box-sizing: border-box; z-index: 100; backdrop-filter: blur(12px); pointer-events: auto; }
        .logo { font-family: 'Playfair Display', serif; font-size: 24px; color: #2C1810; text-decoration: none; font-style: italic; }
        .nav-links { display: flex; gap: 40px; pointer-events: auto; }
        .nav-link { color: #2C1810; text-decoration: none; font-size: 16px; opacity: 0.8; text-transform: uppercase; font-weight: 500; letter-spacing: 0.05em; transition: opacity 0.3s; }
        .nav-link:hover, .nav-link.active { opacity: 1; }
        
        .product-page-container { max-width: 1200px; margin: 120px auto 80px; padding: 0 5%; flex: 1; width: 100%; box-sizing: border-box; }
        .product-layout { display: flex; flex-direction: column; gap: 60px; }
        @media(min-width: 768px) { .product-layout { flex-direction: row; align-items: flex-start; } }
        
        .product-images { flex: 1; position: sticky; top: 120px; }
        .product-images shopify-media { width: 100%; border-radius: 12px; overflow: hidden; display: block; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .product-images shopify-media::part(image) { width: 100%; height: auto; object-fit: cover; }
        
        .product-details { flex: 1; display: flex; flex-direction: column; gap: 32px; }
        .product-title { font-family: 'Playfair Display', serif; font-size: 48px; line-height: 1.1; margin: 0; color: #2C1810; }
        .product-price { font-family: 'Inter', monospace; font-size: 32px; font-weight: 700; color: #D4A574;}
        .product-description { font-size: 16px; line-height: 1.8; color: #5D4F45; }
        
        /* Custom Variant Selector */
        shopify-variant-selector::part(form) { display: flex; flex-direction: column; gap: 20px; margin-bottom: 10px; }
        shopify-variant-selector::part(label) { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #2C1810; display: block; margin-bottom: 8px; }
        shopify-variant-selector::part(radio) { padding: 14px 24px; background: transparent; border: 1px solid #72675C; color: #2C1810; border-radius: 4px; cursor: pointer; transition: all 0.3s ease; font-weight: 500; font-size: 14px; }
        shopify-variant-selector::part(radio-selected) { background: #2C1810; color: #EAE0CD; border-color: #2C1810; }
        
        /* Custom Action Buttons */
        .product-actions { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
        .action-btn { border: none; padding: 20px; width: 100%; font-size: 16px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; border-radius: 4px; cursor: pointer; transition: background 0.3s, color 0.3s, transform 0.2s; }
        .add-to-cart-btn { background: transparent; border: 1px solid #2C1810; color: #2C1810; }
        .add-to-cart-btn:hover { background: #E2D3BE; transform: translateY(-2px); }
        .buy-now-btn { background: #2C1810; color: #EAE0CD; }
        .buy-now-btn:hover { background: #4a2c1a; transform: translateY(-2px); }
        
        /* Shopify Cart Button Style */
        shopify-cart::part(dialog) { border-radius: 12px; background: #EAE0CD; color: #2C1810; }
        shopify-cart::part(primary-button) { background-color: #2C1810; color: #EAE0CD; border: none; border-radius: 4px; font-weight: 600; }
        shopify-cart::part(secondary-button) { border: 1px solid #2C1810; color: #2C1810; fill: #2C1810; border-radius: 4px; }
        
        @media (max-width: 768px) { 
            .nav-container { padding: 15px 20px !important; } 
            .nav-links { gap: 12px !important; } 
            .logo { font-size: 20px !important; white-space: nowrap; } 
            .nav-link { font-size: 14px !important; } 
            .product-page-container { margin-top: 80px !important; padding-top: 20px !important; }
            .product-title { font-size: 36px; } 
        }
        @media (max-width: 480px) { 
            .nav-container { padding: 12px 16px !important; } 
            .nav-links { gap: 8px !important; } 
            .logo { font-size: 15px !important; white-space: nowrap; } 
            .nav-link { font-size: 10px !important; white-space: nowrap; }
            .product-title { font-size: 30px; }
            .product-price { font-size: 26px; }
        }
    </style>
  <script type="module" crossorigin src="/cafe-aroma/assets/modulepreload-polyfill-B5Qt9EMX.js"></script>
  <link rel="stylesheet" crossorigin href="/cafe-aroma/assets/footer-B0Yn5mFe.css">
</head>
<body>
    <nav class="nav-container">
        <a href="index.html" class="logo">Cafe Aroma</a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="collections.html" class="nav-link active">Shop</a>
            <a href="blog.html" class="nav-link">Journal</a>
        </div>
        <button onclick="document.getElementById('cart').showModal()" style="background:none; border:none; cursor:pointer; color:#2C1810;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 20a1 1 0 100 2 1 1 0 000-2zm9 0a1 1 0 100 2 1 1 0 000-2zM1 1h2.79l1.9 15h13.1l1.2-11H5.25"/></svg>
        </button>
    </nav>

    <!-- SHOPIFY CORE -->
    <shopify-store store-domain="e21d1w-na.myshopify.com" public-access-token="94165483cfacc4469db2175db544410c"></shopify-store>
    <shopify-cart id="cart"></shopify-cart>

    <main class="product-page-container">
        <script>
            const pHandle = new URLSearchParams(window.location.search).get('handle');
            if (pHandle) {
                document.write('<shopify-context type="product" id="product-context" handle="' + pHandle + '">');
            } else {
                document.write('<div style="text-align: center; padding: 100px;"><h2>Product Not Found</h2><a href="collections.html">Return to Shop</a></div>');
            }
        </script>
            <template>
                <div class="product-layout">
                    <div class="product-images">
                        <shopify-media query="product.selectedOrFirstAvailableVariant.image" style="background:#F5F5F5; border-radius:12px;"></shopify-media>
                    </div>
                    
                    <div class="product-details">
                        <h1 class="product-title"><shopify-data query="product.title"></shopify-data></h1>
                        <div class="product-price">
                            <shopify-money query="product.selectedOrFirstAvailableVariant.price"></shopify-money>
                        </div>
                        
                        <div class="product-description">
                            <shopify-data query="product.descriptionHtml"></shopify-data>
                        </div>
                        
                        <shopify-variant-selector></shopify-variant-selector>
                        
                        <div style="display:none;" id="current-variant">
                            <shopify-data query="product.selectedOrFirstAvailableVariant.id"></shopify-data>
                        </div>
                        <div class="product-actions">
                            <button class="action-btn add-to-cart-btn" onclick="addToCart()">Add to Cart</button>
                            <button class="action-btn buy-now-btn" onclick="buyNow()">Buy Now</button>
                        </div>
                        
                        <div style="margin-top: 20px; font-size: 13px; color: #72675C; line-height: 1.6;">
                            Free delivery on orders over ₹1500. Subscriptions available at checkout.
                        </div>
                    </div>
                </div>
            </template>
        </shopify-context>
    </main>

    <script>
        function getVariantId() {
            const el = document.getElementById('current-variant');
            if (!el || !el.innerText.trim()) return null;
            return el.innerText.trim();
        }

        function addToCart() {
            const gid = getVariantId();
            if (!gid) { alert('Please wait for the product to load.'); return; }
            
            const cart = document.getElementById('cart');
            if (cart && typeof cart.addLine === 'function') {
                cart.addLine({ variantId: gid, quantity: 1 });
                cart.showModal();
            } else {
                const numeric = gid.split('/').pop();
                window.location.href = `https://e21d1w-na.myshopify.com/cart/${numeric}:1`;
            }
        }

        function buyNow() {
            const gid = getVariantId();
            if (!gid) { alert('Please wait for the product to load.'); return; }
            const numeric = gid.split('/').pop();
            window.location.href = `https://e21d1w-na.myshopify.com/cart/${numeric}:1?checkout=true`;
        }
    </script>

    <!-- BIG FOOTER -->
    <footer class="big-footer" id="site-footer" style="margin-top: 80px;">
      <div class="footer-directory">
        <div class="footer-col">
          <h4>Shop and Learn</h4>
          <a href="product.html?handle=cafe-aroma-dark-espresso-shot">Dark Espresso</a>
          <a href="#">French Vanilla</a>
          <a href="#">Hazelnut Brew</a>
          <a href="collections.html">All Coffees</a>
        </div>
        <div class="footer-col">
          <h4>Support</h4>
          <a href="#">Contact Us</a>
          <a href="#">Shipping Policy</a>
          <a href="#">FAQs</a>
        </div>
      </div>
      <div class="footer-basement">
        <p class="shop-ways">More ways to shop: <a href="#">Find an Aroma Cafe</a> near you.</p>
        <div class="basement-divider"></div>
        <div class="basement-bottom">
          <p class="copyright">Copyright © 2026 Cafe Aroma Inc. All rights reserved.</p>
          <div class="locale">United States</div>
        </div>
      </div>
    </footer>
</body>
</html>
